# home-assistant-bot/docker/compose.yml
name: home-assistant-bot

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hab_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks: [hab_net]
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -t hab/health -m ok -q 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  orchestrator:
    build:
      context: ../services/orchestrator
      dockerfile: Dockerfile
    container_name: hab_orchestrator
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_BASE_TOPIC: "homeassistantbot"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    networks: [hab_net]

  ui:
    build:
      context: ../services/ui
      dockerfile: Dockerfile
    container_name: hab_ui
    environment:
      # se la UI è static e fa fetch dal browser, userà l'IP del RPi (non "orchestrator")
      # se invece hai una UI server-side, puoi usare http://orchestrator:8000
      ORCHESTRATOR_BASE_URL: "http://orchestrator:8000"
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
    restart: unless-stopped
    networks: [hab_net]

  # Reverse proxy opzionale (es. Caddy o Nginx).
  # Utile se vuoi esporre UI+API su una sola porta/host in LAN (es: http://rpi.local)
  reverse-proxy:
    image: caddy:2
    container_name: hab_reverse_proxy
    ports:
      - "80:80"
      # - "443:443"   # abilita solo se configuri TLS (consigliato via VPN, non pubblico)
    volumes:
      - ./reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ui
      - orchestrator
    restart: unless-stopped
    networks: [hab_net]
    profiles: ["proxy"]

  # Node-RED opzionale
  nodered:
    image: nodered/node-red:latest
    container_name: hab_nodered
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    networks: [hab_net]
    profiles: ["nodered"]

networks:
  hab_net:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  nodered_data:
  caddy_data:
  caddy_config: